<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | MarketPulse CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="utils.js"></script>
</head>
<body class="bg-gradient-to-br from-green-50 to-teal-100">
    <div class="flex min-h-screen items-center justify-center p-4">
        <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl p-8">
            <h2 class="text-3xl font-bold text-center text-gray-800">Register</h2>
            <form id="signupForm" class="mt-6">
                <div class="mb-3">
                    <label class="block text-sm font-medium">Full Name</label>
                    <input type="text" id="fullName" class="w-full border rounded-lg p-2" required>
                </div>
                <div class="mb-3">
                    <label class="block text-sm font-medium">Email</label>
                    <input type="email" id="signupEmail" class="w-full border rounded-lg p-2" required>
                </div>
                <div class="mb-3">
                    <label class="block text-sm font-medium">Password</label>
                    <input type="password" id="signupPassword" class="w-full border rounded-lg p-2" required>
                </div>
                <button type="submit" id="submitBtn" class="w-full bg-teal-600 text-white py-2 rounded-lg hover:bg-teal-700 transition">
                    Sign Up
                </button>
            </form>
            <p class="text-center text-sm mt-4">
                Already have an account? <a href="index.html" class="text-teal-600 hover:underline">Login</a>
            </p>
            <div id="errorMsg" class="text-red-600 text-sm mt-3 text-center hidden"></div>
        </div>
    </div>
    <script>
        const form = document.getElementById('signupForm');
        const submitBtn = document.getElementById('submitBtn');
        const errorDiv = document.getElementById('errorMsg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorDiv.classList.add('hidden');
            submitBtn.disabled = true;
            submitBtn.innerText = 'Creating account...';

            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;
            const fullName = document.getElementById('fullName').value.trim();

            if (!email || !password || !fullName) {
                showToast('All fields are required', 'error');
                submitBtn.disabled = false;
                submitBtn.innerText = 'Sign Up';
                return;
            }

            try {
                // Create auth user (store full_name in metadata)
                const { data: authData, error: signUpError } = await window.supabase.auth.signUp({
                    email,
                    password,
                    options: {
                        data: { full_name: fullName }
                    }
                });

                if (signUpError) throw signUpError;
                if (!authData.user) throw new Error('User creation failed');

                // Insert into users table (pending approval)
                const { error: userError } = await window.supabase
                    .from('users')
                    .insert([{
                        id: authData.user.id,
                        email: email,
                        full_name: fullName,
                        role: 'user',
                        approved: false,
                        avatar_url: null
                    }]);

                if (userError) {
                    console.error(userError);
                    throw new Error('Account created but user setup failed. Contact support.');
                }

                showToast('Registration successful! Please wait for admin approval.', 'success');
                setTimeout(() => window.location.href = 'index.html', 2000);
            } catch (err) {
                console.error(err);
                let message = err.message;
                if (message.includes('User already registered')) message = 'Email already registered. Please login.';
                errorDiv.innerText = message;
                errorDiv.classList.remove('hidden');
                showToast(message, 'error');
                submitBtn.disabled = false;
                submitBtn.innerText = 'Sign Up';
            }
        });
    </script>
</body>
</html>
