<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MarketPulse CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="utils.js"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100">
    <div class="flex min-h-screen items-center justify-center p-4">
        <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl p-8">
            <div class="text-center mb-6">
                <i class="fas fa-chart-line text-4xl text-indigo-600"></i>
                <h2 class="text-3xl font-bold mt-2 text-gray-800">MarketPulse CRM</h2>
                <p class="text-gray-500">Sign in to your account</p>
            </div>
            <form id="loginForm">
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Email</label>
                    <input type="email" id="loginEmail" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-400" required>
                </div>
                <div class="mb-6">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Password</label>
                    <input type="password" id="loginPassword" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-400" required>
                </div>
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 rounded-lg transition">Login</button>
            </form>
            <div class="mt-4 text-center text-sm">
                <a href="forgot-password.html" class="text-indigo-600 hover:underline">Forgot password?</a>
                <span class="mx-2">|</span>
                <a href="signup.html" class="text-indigo-600 hover:underline">Create new account</a>
            </div>
            <div id="loginError" class="text-red-600 text-sm mt-3 text-center hidden"></div>
        </div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');
            errorDiv.classList.add('hidden');

            const { error } = await window.supabase.auth.signInWithPassword({ email, password });
            if (error) {
                errorDiv.innerText = error.message;
                errorDiv.classList.remove('hidden');
                showToast(error.message);
                return;
            }

            const { data: { session } } = await window.supabase.auth.getSession();
            let { data: userData, error: userError } = await window.supabase
                .from('users')
                .select('*')
                .eq('id', session.user.id)
                .single();

            // Fallback: if user row missing, create it (e.g., if admin manually added user)
            if (userError && userError.code === 'PGRST116') {
                const fullName = session.user.user_metadata?.full_name || email.split('@')[0];
                const { error: insertError } = await window.supabase
                    .from('users')
                    .insert([{
                        id: session.user.id,
                        email: email,
                        full_name: fullName,
                        role: 'user',
                        approved: false,
                        avatar_url: null
                    }]);
                if (insertError) {
                    console.error(insertError);
                    errorDiv.innerText = 'User record missing. Contact support.';
                    errorDiv.classList.remove('hidden');
                    await window.supabase.auth.signOut();
                    return;
                }
                const { data: newUser } = await window.supabase
                    .from('users')
                    .select('*')
                    .eq('id', session.user.id)
                    .single();
                userData = newUser;
            } else if (userError) {
                console.error(userError);
                errorDiv.innerText = 'Error fetching user data.';
                errorDiv.classList.remove('hidden');
                await window.supabase.auth.signOut();
                return;
            }

            if (!userData.approved && userData.role !== 'admin') {
                await window.supabase.auth.signOut();
                errorDiv.innerText = 'Your account is pending admin approval.';
                errorDiv.classList.remove('hidden');
                showToast('Account not approved yet.', 'error');
                return;
            }

            window.location.href = userData.role === 'admin' ? 'admin-dashboard.html' : 'user-dashboard.html';
        });
    </script>
</body>
</html>
