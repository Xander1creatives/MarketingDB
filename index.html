<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MarketPulse CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="utils.js"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100">
    <div class="flex min-h-screen items-center justify-center p-4">
        <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl p-8">
            <div class="text-center mb-6">
                <i class="fas fa-chart-line text-4xl text-indigo-600"></i>
                <h2 class="text-3xl font-bold mt-2 text-gray-800">MarketPulse CRM</h2>
                <p class="text-gray-500">Sign in to your account</p>
            </div>
            <form id="loginForm">
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Email</label>
                    <input type="email" id="loginEmail" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-400" required>
                </div>
                <div class="mb-6">
                    <label class="block text-gray-700 text-sm font-bold mb-2">Password</label>
                    <input type="password" id="loginPassword" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-400" required>
                </div>
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 rounded-lg transition">Login</button>
            </form>
            <div class="mt-4 text-center text-sm">
                <a href="forgot-password.html" class="text-indigo-600 hover:underline">Forgot password?</a>
                <span class="mx-2">|</span>
                <a href="signup.html" class="text-indigo-600 hover:underline">Create new account</a>
            </div>
            <div id="loginError" class="text-red-600 text-sm mt-3 text-center hidden"></div>
        </div>
    </div>
    <script>
        // Wait for DOM and ensure supabase is loaded
        document.addEventListener('DOMContentLoaded', () => {
            if (!window.supabase) {
                document.getElementById('loginError').innerText = 'System error: Supabase not initialized. Please refresh.';
                document.getElementById('loginError').classList.remove('hidden');
                return;
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');
            errorDiv.classList.add('hidden');
            
            const { error } = await window.supabase.auth.signInWithPassword({ email, password });
            if (error) {
                errorDiv.innerText = error.message;
                errorDiv.classList.remove('hidden');
                showToast(error.message);
                return;
            }
            
            // Fetch profile to check approval and role
            const { data: { session } } = await window.supabase.auth.getSession();
            const { data: profile, error: profileError } = await window.supabase
                .from('profiles')
                .select('role, approved')
                .eq('id', session.user.id)
                .single();
                
            if (profileError || !profile) {
                await window.supabase.auth.signOut();
                errorDiv.innerText = 'Profile not found. Please contact support.';
                errorDiv.classList.remove('hidden');
                return;
            }
            
            if (!profile.approved && profile.role !== 'admin') {
                await window.supabase.auth.signOut();
                errorDiv.innerText = 'Your account is pending admin approval.';
                errorDiv.classList.remove('hidden');
                showToast('Account not approved yet.', 'error');
                return;
            }
            
            // Redirect based on role
            if (profile.role === 'admin') {
                window.location.href = 'admin-dashboard.html';
            } else {
                window.location.href = 'user-dashboard.html';
            }
        });
    </script>
</body>
</html>
