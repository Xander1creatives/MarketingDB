<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | MarketPulse CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="utils.js"></script>
</head>
<body class="bg-gray-100">
    <div class="flex min-h-screen items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
            <h2 class="text-2xl font-bold mb-4">Reset Password</h2>
            <p class="text-gray-600 mb-4">Enter your email address and we'll send you a link to reset your password.</p>
            <form id="resetForm">
                <input type="email" id="resetEmail" placeholder="Your email" class="w-full border p-2 rounded mb-4" required>
                <button type="submit" id="sendBtn" class="bg-indigo-600 text-white w-full py-2 rounded hover:bg-indigo-700 transition">
                    Send Reset Link
                </button>
            </form>
            <a href="index.html" class="text-sm text-indigo-500 mt-3 inline-block">Back to Login</a>
            <div id="resetMsg" class="text-sm mt-3 text-center hidden"></div>
        </div>
    </div>
    <script>
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('resetEmail').value;
            const sendBtn = document.getElementById('sendBtn');
            const msgDiv = document.getElementById('resetMsg');
            sendBtn.disabled = true;
            sendBtn.innerText = 'Sending...';
            msgDiv.classList.add('hidden');

            try {
                // The redirectTo should point to your reset-password.html page
                const { error } = await window.supabase.auth.resetPasswordForEmail(email, {
                    redirectTo: `${window.location.origin}/reset-password.html`
                });
                if (error) throw error;
                msgDiv.innerText = 'Password reset email sent! Check your inbox.';
                msgDiv.classList.remove('hidden');
                msgDiv.classList.add('text-green-600');
                showToast('Reset link sent!', 'success');
            } catch (err) {
                msgDiv.innerText = err.message;
                msgDiv.classList.remove('hidden');
                msgDiv.classList.add('text-red-600');
                showToast(err.message, 'error');
            } finally {
                sendBtn.disabled = false;
                sendBtn.innerText = 'Send Reset Link';
            }
        });
    </script>
</body>
</html>
