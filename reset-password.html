<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password | MarketPulse CRM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="utils.js"></script>
</head>
<body class="bg-gray-100">
    <div class="flex min-h-screen items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
            <h2 class="text-2xl font-bold mb-4">Create New Password</h2>
            <form id="resetPasswordForm">
                <div class="mb-4">
                    <label class="block text-sm font-medium mb-1">New Password</label>
                    <input type="password" id="newPassword" class="w-full border p-2 rounded" required minlength="6">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium mb-1">Confirm Password</label>
                    <input type="password" id="confirmPassword" class="w-full border p-2 rounded" required>
                </div>
                <button type="submit" id="resetBtn" class="bg-green-600 text-white w-full py-2 rounded hover:bg-green-700 transition">
                    Update Password
                </button>
            </form>
            <a href="index.html" class="text-sm text-indigo-500 mt-3 inline-block">Back to Login</a>
            <div id="resetMsg" class="text-sm mt-3 text-center hidden"></div>
        </div>
    </div>
    <script>
        const form = document.getElementById('resetPasswordForm');
        const resetBtn = document.getElementById('resetBtn');
        const msgDiv = document.getElementById('resetMsg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (newPassword !== confirmPassword) {
                msgDiv.innerText = 'Passwords do not match.';
                msgDiv.classList.remove('hidden');
                msgDiv.classList.add('text-red-600');
                return;
            }

            resetBtn.disabled = true;
            resetBtn.innerText = 'Updating...';
            msgDiv.classList.add('hidden');

            try {
                // The reset token is automatically handled by Supabase's session from the URL hash
                const { error } = await window.supabase.auth.updateUser({ password: newPassword });
                if (error) throw error;
                msgDiv.innerText = 'Password updated successfully! Redirecting to login...';
                msgDiv.classList.remove('hidden');
                msgDiv.classList.add('text-green-600');
                showToast('Password updated!', 'success');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);
            } catch (err) {
                msgDiv.innerText = err.message;
                msgDiv.classList.remove('hidden');
                msgDiv.classList.add('text-red-600');
                showToast(err.message, 'error');
                resetBtn.disabled = false;
                resetBtn.innerText = 'Update Password';
            }
        });

        // Check if we have a valid session from the reset link
        (async () => {
            const { data: { session } } = await window.supabase.auth.getSession();
            if (!session) {
                msgDiv.innerText = 'Invalid or expired reset link. Please request a new one.';
                msgDiv.classList.remove('hidden');
                msgDiv.classList.add('text-red-600');
                resetBtn.disabled = true;
            }
        })();
    </script>
</body>
</html>
